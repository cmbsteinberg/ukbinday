services:
  api:
    build: .
    ports:
      - "8000:8000"
    mem_limit: 4g
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - BASE_URL=${BASE_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - SCRAPER_TIMEOUT=${SCRAPER_TIMEOUT:-30}
      - CACHE_TTL=${CACHE_TTL:-50400}
      - RATE_LIMIT_HOURLY=${RATE_LIMIT_HOURLY:-200}
      - ADDRESS_API_URL=${ADDRESS_API_URL:-}
      - ADDRESS_API_COMPANY_ID=${ADDRESS_API_COMPANY_ID:-}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET:-}
      - DATA_DIR=${DATA_DIR:-/app/data}
      - ICS_RETENTION_DAYS=${ICS_RETENTION_DAYS:-365}
      - ICS_REFRESH_HOUR_UTC=${ICS_REFRESH_HOUR_UTC:-3}
      - ICS_REFRESH_CONCURRENCY=${ICS_REFRESH_CONCURRENCY:-4}
      - ICS_FAILURE_THRESHOLD=${ICS_FAILURE_THRESHOLD:-14}
      - RUN_REFRESH_JOB=0
    volumes:
      - bins_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  worker:
    build: .
    command: [".venv/bin/python", "-m", "api.services.refresh_job"]
    mem_limit: 2g
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=${DATA_DIR:-/app/data}
      - ICS_REFRESH_HOUR_UTC=${ICS_REFRESH_HOUR_UTC:-3}
      - ICS_REFRESH_CONCURRENCY=${ICS_REFRESH_CONCURRENCY:-4}
      - ICS_FAILURE_THRESHOLD=${ICS_FAILURE_THRESHOLD:-14}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - SCRAPER_TIMEOUT=${SCRAPER_TIMEOUT:-30}
    volumes:
      - bins_data:/app/data
    restart: always

  redis:
    image: redis:7-alpine
    mem_limit: 512m
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  caddy:
    image: caddy:2-alpine
    mem_limit: 512m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_logs:/var/log/caddy
      - goaccess_report:/srv/goaccess:ro
    environment:
      - GOACCESS_USER=${GOACCESS_USER:-admin}
      - GOACCESS_HASH=${GOACCESS_HASH}
    depends_on:
      api:
        condition: service_healthy
    restart: always

  goaccess:
    image: allinurl/goaccess:latest
    mem_limit: 256m
    volumes:
      - caddy_logs:/var/log/caddy:ro
      - goaccess_report:/srv/goaccess
      - ./goaccess.conf:/etc/goaccess/goaccess.conf:ro
    command: ["--config-file=/etc/goaccess/goaccess.conf", "--log-file=/var/log/caddy/access.log"]
    depends_on:
      - caddy
    restart: always

  uptime-kuma:
    image: louislam/uptime-kuma:1
    mem_limit: 512m
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime_data:/data
    restart: always

volumes:
  redis_data:
  caddy_data:
  caddy_logs:
  goaccess_report:
  uptime_data:
  bins_data:
