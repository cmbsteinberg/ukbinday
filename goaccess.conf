# GoAccess configuration for Caddy JSON logs

# Log format: Caddy JSON
log-format CADDY

# Real-time HTML
real-time-html true
ws-url wss://bincollection.co.uk/goaccess/ws

# Output
output /srv/goaccess/index.html

# Persist parsed data across restarts
db-path /srv/goaccess/data
persist-parsed true

# Ignore crawlers
ignore-crawlers true

# Ignore health check noise
exclude-ip 127.0.0.1
ignore-panel REMOTE_USER

# HTML report preferences
html-prefs {"theme":"dark-purple"}
