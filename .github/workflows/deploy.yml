name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Smoke tests
        run: uv run pytest tests/test_ci.py -v

  deploy:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: TURNSTILE_SITE_KEY,TURNSTILE_SECRET
          script_stop: true
          script: |
            cd /home/deploy/bins
            git fetch origin main
            git reset --hard origin/main
            grep -v '^TURNSTILE_' .env > .env.tmp 2>/dev/null || true
            echo "TURNSTILE_SITE_KEY=$TURNSTILE_SITE_KEY" >> .env.tmp
            echo "TURNSTILE_SECRET=$TURNSTILE_SECRET" >> .env.tmp
            mv .env.tmp .env
            docker compose up -d --build --remove-orphans

  integration-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Integration tests
        run: uv run pytest tests/test_integration.py -v --tb=short || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: tests/integration_output.json

      - name: Commit regenerated artefacts
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update post-integration artefacts [skip ci]"
          git push
