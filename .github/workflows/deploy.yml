name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Smoke tests
        run: uv run pytest tests/test_ci.py -v

  deploy:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/deploy/bins
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans

  integration-test:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Integration tests
        run: uv run pytest tests/test_integration.py -v --tb=short || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: tests/integration_output.json

      - name: Update README badge and sankey
        if: always()
        run: uv run python -m scripts.generate_sankey

      - name: Commit updated badge and README
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badge_coverage.json README.md
          git diff --staged --quiet || git commit -m "Update coverage badge and sankey [skip ci]"
          git push
