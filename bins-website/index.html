<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Bin Collection Lookup</title>
  <meta name="description" content="Find your bin collection schedule across 300+ UK councils. Enter your postcode to get started.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
  <main class="container">
    <nav>
      <ul>
        <li><strong>UK Bin Lookup</strong></li>
      </ul>
      <ul>
        <li><a href="index.html" aria-current="page">Home</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>

    <article>
      <hgroup>
        <h1>Find Your Bin Collection</h1>
        <p>Enter your postcode to look up bin collection schedules across 300+ UK councils</p>
      </hgroup>

      <!-- Step 1: Postcode Entry -->
      <section id="postcode-section">
        <label for="postcode">
          Postcode
          <input
            type="text"
            id="postcode"
            placeholder="e.g. SW1A 1AA"
            autocomplete="postal-code"
            pattern="[A-Za-z]{1,2}\d[A-Za-z\d]?\s?\d[A-Za-z]{2}"
            required>
        </label>
        <button id="find-addresses" type="button">Find Addresses</button>
        <div id="postcode-error" role="alert" style="display:none;"></div>
      </section>

      <!-- Step 2: Address Selection -->
      <section id="address-section" style="display:none;">
        <label for="address-input">
          Select Your Address
          <input
            list="addresses"
            id="address-input"
            placeholder="Start typing to filter addresses..."
            autocomplete="off">
        </label>
        <datalist id="addresses">
          <!-- Dynamically populated with addresses -->
        </datalist>
        <small id="address-count"></small>
        <button id="find-bins" type="button">Find Bin Collections</button>
        <div id="address-error" role="alert" style="display:none;"></div>
      </section>

      <!-- Step 3: Results Display -->
      <section id="results" style="display:none;">
        <h2>Bin Collection Schedule</h2>
        <div id="council-info"></div>
        <div id="bin-data"></div>
        <button id="start-over" type="button" class="secondary">Start Over</button>
      </section>

      <!-- Loading Indicator -->
      <div id="loading" aria-busy="true" style="display:none;">Loading...</div>
    </article>

    <footer>
      <small>
        Data sourced from UK local council APIs.
        <a href="about.html">Learn more</a> about how this service works.
      </small>
    </footer>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
