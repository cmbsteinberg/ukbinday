pre-commit:
  parallel: true
  commands:
    sync-gov-uk-sources:
      run: scripts/scraper_transformation/mampfes/sync_gov_uk_sources.sh
    # 1. Sync dependencies with uv
    # This ensures your lockfile is up to date before any code is committed.
    uv-sync:
      tags: backend
      run: uv sync --locked

    # 2. Linting with Ruff
    # Uses 'ruff check' to catch errors and code style issues.
    ruff-check:
      tags: linter
      glob: "*.py"
      exclude:
        - "api/scrapers/**"
        - "scripts/scraper_transformation/mampfes/waste_sources/**"
        - "scripts/scraper_transformation/robbrad/robbrad_sources/**"
      run: uv run ruff check --fix {staged_files}

    docker-check:
      tags: linter
      glob: "Dockerfile"
      run: hadolint Dockerfile

    biome-check:
      glob: "*.{js}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
