pre-commit:
  parallel: true
  commands:
    sync-gov-uk-sources:
      run: src/scripts/scraper_transformation/sync_gov_uk_sources.sh
    # 1. Sync dependencies with uv
    # This ensures your lockfile is up to date before any code is committed.
    uv-sync:
      tags: backend
      run: uv sync --locked

    # 2. Linting with Ruff
    # Uses 'ruff check' to catch errors and code style issues.
    ruff-check:
      tags: linter
      glob: "*.py"
      exclude: "src/api/scrapers/**"
      run: uv run ruff check --fix {staged_files}

    caddy-check:
      tags: linter
      run: caddy validate Caddyfile

    docker-check:
      tags: linter
      run: hadolint Dockerfile
    
    biome-check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true