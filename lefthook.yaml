pre-commit:
  parallel: true
  commands:
    sync-gov-uk-sources:
      run: pipeline/sync.sh

    sync-passthrough-urls:
      glob:
        - "api/scrapers/ukbcd_google_public_calendar_council.py"
        - "api/static/app.js"
      run: scripts/sync_passthrough_urls.sh
      stage_fixed: true
    # 1. Sync dependencies with uv
    # This ensures your lockfile is up to date before any code is committed.
    uv-sync:
      tags: backend
      run: uv sync --locked

    # 2. Linting with Ruff
    # Uses 'ruff check' to catch errors and code style issues.
    ruff-check:
      tags: linter
      glob: "*.py"
      exclude:
        - "api/scrapers/**"
        - "pipeline/upstream/**"
      run: uv run ruff check --fix {staged_files}

    biome-check:
      glob: "*.{js}"
      run: npx --yes @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true

    # 3. CI smoke tests — scrapers compile, compat imports, app starts
    ci-tests:
      tags: test
      glob: "*.py"
      run: uv run pytest tests/test_ci.py -x -q --tb=short
    # Opt-in: RUN_INTEGRATION=1 git commit ...
    integration-tests:
      tags: integration
      only:
        - run: test "${RUN_INTEGRATION:-0}" = "1"
      run: uv run pytest tests/test_integration.py -v --tb=short; ./scripts/post_integration.sh
      stage_fixed: true
