# Standardized template with YAML anchors for defaults

# Default template - all councils inherit from this
default_council: &default_council
  name: ""
  
  # Default: no authentication needed
  auth:
    type: "none"
    landing_page: ""
    token_patterns: {}
    form_data: {}
  
  # Default endpoint structure
  endpoints:
    address_search:
      url: ""
      method: "GET"
      params: {}
    collection_data:
      url: ""
      method: "GET"
      params: {}
  
  headers: {}
  metadata_endpoint: ""
  payload_template: ""

# Pattern 1: REST API (Cambridge style)
cambridge_city_council:
  <<: *default_council
  name: "Cambridge City Council"
  
  endpoints:
    address_search:
      url: "https://servicelayer3c.azure-api.net/wastecalendar/address/search"
      method: "GET"
      params:
        postcode: "{postcode}"
    collection_data:
      url: "https://servicelayer3c.azure-api.net/wastecalendar/collection/search/{address_id}"
      method: "GET" 
      params:
        authority: "CCC"
        numberOfCollections: 12

# Pattern 2: POST Service (Brighton style)  
brighton_and_hove_city_council:
  <<: *default_council
  name: "Brighton and Hove City Council"
  
  endpoints:
    address_search:
      url: "https://enviroservices.brighton-hove.gov.uk/xas/"
      method: "POST"
      params:
        postcode: "{postcode}"
        action: "search"
  
  metadata_endpoint: "https://enviroservices.brighton-hove.gov.uk/metamodel.json"
  payload_template: '{"postcode": "{postcode}", "action": "search"}'

# Pattern 3: Token-based API (Croydon style)
london_borough_of_croydon:
  <<: *default_council
  name: "London Borough of Croydon"
  
  auth:
    type: "token"
    landing_page: "https://service.croydon.gov.uk/wasteservices/w/webpage/bin-day-enter-address"
    token_patterns:
      webpage_token: "webpage_token=([a-f0-9]+)"
    form_data: {}
  
  endpoints:
    address_search:
      url: "https://service.croydon.gov.uk/wasteservices/w/webpage/bin-day-enter-address"
      method: "POST"
      params:
        webpage_token: "{webpage_token}"
        postcode: "{postcode}"
        action: "search"

# Pattern 4: Form Token API (Wigan style)
wigan_metropolitan_borough_council:
  <<: *default_council
  name: "Wigan Metropolitan Borough Council"
  
  auth:
    type: "form_token"
    landing_page: "https://apps.wigan.gov.uk/MyNeighbourhood/"
    token_patterns:
      __VIEWSTATE: '__VIEWSTATE[^>]+value="([^"]+)"'
      __VIEWSTATEGENERATOR: '__VIEWSTATEGENERATOR[^>]+value="([^"]+)"'
      __EVENTVALIDATION: '__EVENTVALIDATION[^>]+value="([^"]+)"'
    form_data:
      "ctl00$ContentPlaceHolder1$btnPostcodeSearch": "Search"
  
  endpoints:
    address_search:
      url: "https://apps.wigan.gov.uk/MyNeighbourhood/"
      method: "POST"
      params:
        "ctl00$ContentPlaceHolder1$txtPostcode": "{postcode}"
        __VIEWSTATE: "{__VIEWSTATE}"
        __VIEWSTATEGENERATOR: "{__VIEWSTATEGENERATOR}"
        __EVENTVALIDATION: "{__EVENTVALIDATION}"
        "ctl00$ContentPlaceHolder1$btnPostcodeSearch": "Search"

# Pattern 5: Simple REST with UPRN (Ashford style)
ashford_borough_council:
  <<: *default_council
  name: "Ashford Borough Council"
  
  endpoints:
    address_search:
      url: "https://secure.ashford.gov.uk/waste/collectiondaylookup/api/address"
      method: "GET"
      params:
        postcode: "{postcode}"
    collection_data:
      url: "https://secure.ashford.gov.uk/waste/collectiondaylookup/api/collections/{uprn}"
      method: "GET"
      params: {}

# Pattern 6: Postcode lookup with address selection (Barnsley style)
barnsley_metropolitan_borough_council:
  <<: *default_council
  name: "Barnsley Metropolitan Borough Council"
  
  endpoints:
    address_search:
      url: "https://waste.barnsley.gov.uk/ViewCollection/SelectAddress"
      method: "GET"
      params:
        postcode: "{postcode}"
    collection_data:
      url: "https://waste.barnsley.gov.uk/ViewCollection/Collections"
      method: "GET"
      params:
        address_id: "{address_id}"

# Pattern 7: Legacy form-based postcode lookup (Basildon style)
basildon_borough_council:
  <<: *default_council
  name: "Basildon Borough Council"
  
  endpoints:
    address_search:
      url: "http://www3.basildon.gov.uk/website2/postcodes.nsf/frmMyBasildonMobile"
      method: "POST"
      params:
        postcode: "{postcode}"
        openform: ""
    collection_data:
      url: "http://www3.basildon.gov.uk/website2/postcodes.nsf/frmMyBasildonMobile"
      method: "POST"
      params:
        Seq: "2"
        PC: ""
        address: "{address}"