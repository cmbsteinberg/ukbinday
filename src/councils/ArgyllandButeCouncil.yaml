council: ArgyllandButeCouncil
request_type: single_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www.argyll-bute.gov.uk/rubbish-and-recycling/household-waste/bin-collection
api_methods:
- POST
api_description: '[AUTO-CORRECTED from id_lookup_then_api] The site uses a multi-step
  Drupal form. The first POST submits the postcode to generate the address list, and
  the second POST submits the selected UPRN (address) to return the collection table.'
api_headers:
  Content-Type: application/x-www-form-urlencoded
  User-Agent: Mozilla/5.0
api_payload_example: postcode=PA286LJ&form_id=argyll_bute_bin_collection_form&op=Search&form_build_id=form-XXXXX
response_format: html
bin_selector: //th[contains(text(),'Collection date')]/ancestor::table
date_format: '%A %d %B %Y'
test_inputs:
  uprn: '000125011723'
  postcode: PA286LJ
