council: LondonBoroughRedbridge
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://my.redbridge.gov.uk/Shared/SearchAddress
- https://my.redbridge.gov.uk/Shared/SaveAddress
- https://my.redbridge.gov.uk/RecycleRefuse
api_methods:
- GET
api_description: The process involves searching for addresses by postcode to get a
  list of properties, then 'saving' the selected UPRN to the session via a GET request,
  and finally fetching the main page which renders the schedule based on the session
  state.
api_headers:
  Accept: application/json, text/javascript, */*; q=0.01
  X-Requested-With: XMLHttpRequest
response_format: html
bin_selector: .your-collection-schedule-container
date_format: '%d %B %Y'
test_inputs:
  uprn: '10023770353'
  postcode: IG2 6LQ
