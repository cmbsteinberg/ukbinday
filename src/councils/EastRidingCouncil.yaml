council: EastRidingCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://wasterecyclingapi.eastriding.gov.uk/api/v1/addresses?postcode={postcode}
- https://wasterecyclingapi.eastriding.gov.uk/api/v1/collections?addressId={address_id}
api_methods:
- GET
- GET
api_description: The site uses a waste recycling API hosted on a separate subdomain.
  It first looks up the address based on a postcode, which returns a list of address
  objects containing IDs. Once the user selects their specific address (house number),
  a second GET request is made to the collections endpoint using that address ID.
api_headers:
  Accept: application/json
  Origin: https://www.eastriding.gov.uk
  Referer: https://www.eastriding.gov.uk/
response_format: html
bin_selector: .results
date_format: '%a, %d %b %Y'
test_inputs:
  postcode: HU17 8LG
