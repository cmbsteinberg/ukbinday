council: NorthYorkshire
request_type: id_lookup_then_api
required_user_input:
- uprn
api_urls:
- https://www.northyorks.gov.uk/bin-calendar/lookup
api_methods:
- POST
api_description: First, a POST request is sent to the lookup endpoint with the UPRN
  to resolve the specific calendar URL. The response URL is then appended with '/ajax'
  to fetch the raw JSON data containing the collection table HTML.
response_format: json
bin_selector: div#upcoming-collection table tbody tr
date_format: '%d %B %Y'
test_inputs:
  uprn: '10093091235'
