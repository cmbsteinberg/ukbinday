council: BlackpoolCouncil
request_type: token_then_api
required_user_input:
- uprn
- postcode
api_urls:
- https://api.blackpool.gov.uk/live//api/bartec/security/token
- https://api.blackpool.gov.uk/live//api/bartec/collection/PremiseJobs
api_methods:
- GET
- POST
api_description: The script first fetches an authentication token from the security/token
  endpoint using a GET request. It then uses this token along with the UPRN and Postcode
  in a JSON body POST request to the PremiseJobs endpoint to retrieve bin collection
  schedules.
response_format: json
bin_selector: jobsField
date_format: '%Y-%m-%dT%H:%M:%S'
test_inputs:
  uprn: '100010813607'
  postcode: FY3 8EB
