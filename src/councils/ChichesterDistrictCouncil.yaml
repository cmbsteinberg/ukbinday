council: ChichesterDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://www.chichester.gov.uk/checkyourbinday
api_methods:
- POST
api_description: The site uses a form-based interaction where a postcode lookup returns
  a list of address IDs (UPRNs), and selecting an address performs a form submission
  (Postback) to reveal the collection dates.
api_headers:
  Content-Type: application/x-www-form-urlencoded
  User-Agent: Mozilla/5.0
api_payload_example: WASTECOLLECTIONCALENDARV5_CALENDAR_ADDRESSLOOKUPPOSTCODE=RH14+0JT&WASTECOLLECTIONCALENDARV5_CALENDAR_ADDRESSLOOKUPSEARCH=Search&WASTECOLLECTIONCALENDARV5_CALENDAR_ADDRESSLOOKUPADDRESS=SELECTED_UPRN
response_format: html
bin_selector: table.defaultgeneral.bin-collection-dates tr
date_format: '%d %B %Y'
test_inputs:
  postcode: RH14 0JT
