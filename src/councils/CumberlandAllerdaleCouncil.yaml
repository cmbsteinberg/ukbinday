council: CumberlandAllerdaleCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://abc-wrp.whitespacews.com/
api_methods:
- GET
- POST
api_description: The site uses Whitespace Portal. It first fetches an entry page to
  get a dynamic link, then posts address data to get a property list, selects the
  first property link, and finally scrapes the collection schedule from the resulting
  page.
response_format: html
bin_selector: section#scheduled-collections u1
date_format: '%d/%m/%Y'
test_inputs:
  postcode: CA13 0DE
