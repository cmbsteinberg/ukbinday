council: HartlepoolBoroughCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://online.hartlepool.gov.uk/authapi/isauthenticated
- https://online.hartlepool.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: The script first authenticates to obtain a session ID (auth-session)
  from the isauthenticated endpoint. It then makes a POST request to runLookup with
  a form payload containing the UPRN and the session ID in the query parameters to
  retrieve collection data as HTML inside a JSON response.
response_format: json
bin_selector: HTMLCollectionDatesText
date_format: DD/MM/YYYY
test_inputs:
  uprn: '100110019551'
