council: FyldeCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://fylde.gov.uk/resident/bins-recycling-and-rubbish/bin-collection-day
- https://collectiveview.bartec-systems.com/R152/GetData.ashx
api_methods:
- GET
api_description: First, the council webpage is scraped to extract a 'Token' parameter
  from the Bartec iframe source URL. This token is then used as a parameter in a GET
  request to the Bartec API endpoint (GetData.ashx) along with the UPRN and the method
  'calendareventsfromtoken'.
response_format: json
date_format: Unix timestamp in MS (e.g., /Date(1234567890000)/)
test_inputs:
  uprn: '100010402452'
