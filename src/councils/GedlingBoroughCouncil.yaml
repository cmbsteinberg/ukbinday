council: GedlingBoroughCouncil
request_type: single_api
required_user_input:
- house_number
- skip_get_url
api_urls:
- https://www.gbcbincalendars.co.uk/json/gedling_borough_council_{house_number}_bin_schedule.json
- https://www.gbcbincalendars.co.uk/json/gedling_borough_council_{house_number}_garden_bin_schedule.json
api_methods:
- GET
api_description: The council provides bin schedules as JSON files hosted on gbcbincalendars.co.uk.
  The URL is constructed using the house number or property identifier. For domestic
  waste, it uses '_bin_schedule.json', and for garden waste, it uses '_garden_bin_schedule.json'.
response_format: json
date_format: '%Y-%m-%d'
