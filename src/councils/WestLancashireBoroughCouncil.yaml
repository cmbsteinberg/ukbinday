council: WestLancashireBoroughCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://your.westlancs.gov.uk/yourwestlancs.aspx?address={postcode}
api_methods:
- POST
api_description: Initial GET to the URL with the postcode in the query string returns
  a table of addresses. A POST request is then made using ASP.NET __VIEWSTATE and
  __EVENTTARGET (containing the row selector for the specific UPRN) to retrieve the
  bin collection details.
response_format: html
bin_selector: '#StreetSceneTable'
date_format: dd/MM/yyyy
test_inputs:
  uprn: '10012343339'
  postcode: WN8 0HR
