council: WakefieldCityCouncil
request_type: single_api
required_user_input:
- uprn
- a
- usrn
- e
- n
- p
api_urls:
- https://www.wakefield.gov.uk/where-i-live/
api_methods:
- GET
api_description: The bin collection dates are rendered server-side when navigating
  to the 'Where I Live' URL with a specific UPRN and coordinate parameters.
api_headers:
  User-Agent: Mozilla/5.0
  Accept: text/html
response_format: html
bin_selector: div.wil_c-content-section_heading
date_format: '%A, %d %B %Y'
test_inputs:
  uprn: '63035490'
  usrn: '41801243'
