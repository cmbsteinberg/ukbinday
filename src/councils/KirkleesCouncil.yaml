council: KirkleesCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://my.kirklees.gov.uk/authapi/isauthenticated?uri=https%253A%252F%252Fmy.kirklees.gov.uk%252Fservice%252FBins_and_recycling___Manage_your_bins&hostname=my.kirklees.gov.uk&withCredentials=true
- https://my.kirklees.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, a GET request is made to the authentication endpoint to retrieve
  a session ID (sid). This session ID is then passed as a query parameter in a POST
  request to the runLookup API endpoint, along with the UPRN in the JSON body to retrieve
  bin collection details.
response_format: json
date_format: '%Y-%m-%dT%H:%M:%S'
test_inputs:
  uprn: '83002937'
