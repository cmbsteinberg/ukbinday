council: HarrogateBoroughCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://secure.harrogate.gov.uk/inmyarea/Property/?uprn={uprn}
api_methods:
- POST
api_description: The council website accepts a UPRN in a POST request to a property-specific
  URL, which returns an HTML page containing bin collection schedules in a table with
  class 'hbcRounds'.
response_format: html
bin_selector: table.hbcRounds tr
date_format: '%a %d %b %Y'
test_inputs:
  uprn: '100050414307'
