council: SandwellBoroughCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://my.sandwell.gov.uk/authapi/isauthenticated?uri=https%253A%252F%252Fmy.sandwell.gov.uk%252Fen%252F...
- https://my.sandwell.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, a GET request to the session URL retrieves an 'auth-session'
  ID (sid). Then, multiple POST requests are made to runLookup using specific request
  IDs (686295a88a750, 686294de50729, 6863a78a1dd8e, 68629dd642423) for different bin
  types. The payload includes the UPRN and a timestamp.
response_format: json
date_format: YYYY-MM-DD
test_inputs:
  uprn: '32101971'
