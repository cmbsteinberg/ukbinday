council: IpswichBoroughCouncil
request_type: single_api
required_user_input:
- house_number
api_urls:
- https://app.ipswich.gov.uk/bin-collection/
api_methods:
- POST
api_description: The council uses a simple POST request where the house number or
  street input is sent as form data. The response is HTML containing the bin collection
  dates.
response_format: html
bin_selector: div.ibc-page-content-section li
date_format: '%A %d %B %Y'
