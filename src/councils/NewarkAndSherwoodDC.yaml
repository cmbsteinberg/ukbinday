council: NewarkAndSherwoodDC
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://app.newark-sherwooddc.gov.uk/bincollection/default.aspx?uprn={uprn}
api_methods:
- GET
api_description: The bin collection data is rendered directly on the page based on
  the UPRN parameter passed in the query string.
api_headers:
  User-Agent: Mozilla/5.0
  Accept: text/html
response_format: html
bin_selector: table[class*="table table-condensed"]
date_format: '%A %d %B %Y'
test_inputs:
  uprn: '200004258529'
