council: DorsetCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://geoapi.dorsetcouncil.gov.uk/v1/services/
api_methods:
- GET
api_description: The script iterates through a list of service types (recyclingday,
  refuseday, foodwasteday, gardenwasteday) and appends the UPRN to the base URL to
  fetch the next collection date for each bin type.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  uprn: '100040711049'
