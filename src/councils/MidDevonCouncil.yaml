council: MidDevonCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://my.middevon.gov.uk/authapi/isauthenticated
- https://my.middevon.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, the script authenticates to get a session ID ('sid') from
  the authapi. It then loops through a specific set of lookups for different bin types
  using the 'runLookup' endpoint. The UPRN is passed within the JSON payload under
  'formValues' -> 'Your Address' -> 'listAddress'. Each successful response returns
  collection data in the 'rows_data' field.
response_format: json
date_format: '%d-%b-%y'
test_inputs:
  uprn: '200003997770'
