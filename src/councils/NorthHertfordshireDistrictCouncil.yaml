council: NorthHertfordshireDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- paon
- uprn
api_urls:
- https://apps.cloud9technologies.com/northherts/citizenmobile/mobileapi/addresses
- https://apps.cloud9technologies.com/northherts/citizenmobile/mobileapi/wastecollections/{uprn}
api_methods:
- GET
api_description: First, the system looks up the UPRN via the addresses endpoint using
  the postcode. Then, it queries the wastecollections endpoint using the retrieved
  UPRN. Authentication is handled via a hardcoded Basic Auth header extracted from
  the mobile app.
response_format: json
date_format: ISO format (YYYY-MM-DDTHH:MM:SS)
test_inputs:
  uprn: '100081258147'
