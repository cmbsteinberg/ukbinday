council: WyreCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.wyre.gov.uk/bincollections?uprn={user_uprn}
api_methods:
- GET
api_description: Calls the Wyre Council bin collection API using the UPRN and parses
  the HTML response returned in the JSON payload.
response_format: html
bin_selector: div.boxed
date_format: '%A %d %B'
test_inputs:
  uprn: '10003519994'
