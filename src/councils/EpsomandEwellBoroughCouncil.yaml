council: EpsomandEwellBoroughCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://iweb.itouchvision.com/portal/itouchvision/kmbd/address
- https://iweb.itouchvision.com/portal/itouchvision/kmbd/collectionDay
