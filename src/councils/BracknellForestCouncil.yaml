council: BracknellForestCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- paon
- postcode
api_urls:
- https://selfservice.mybfc.bracknell-forest.gov.uk/w/webpage/waste-collection-days
api_methods:
- POST
api_description: Initial GET to waste-collection-days to retrieve a CSRF token from
  the script block. Then a POST with code_action 'find_addresses' using the postcode
  to retrieve the addressId. Finally, a POST with code_action 'find_rounds' using
  the addressId to get collection dates.
response_format: json
date_format: '%A %d %B %Y'
test_inputs:
  postcode: GU47 9BS
