council: GlasgowCityCouncil
request_type: single_api
required_user_input:
- uprn
- skip_get_url
api_urls:
- https://onlineservices.glasgow.gov.uk/forms/refuseandrecyclingcalendar/CollectionsCalendar.aspx?UPRN={uprn}
api_methods:
- GET
api_description: The API call fetches an HTML calendar page using the UPRN in the
  query string. The response is then parsed for bin collection dates.
response_format: html
bin_selector: fieldset p, table[title='Calendar'] img
date_format: '%A %d %B %Y'
test_inputs:
  uprn: '906700034497'
