council: ChorleyCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://forms.chorleysouthribble.gov.uk/chorley-bincollectiondays
api_methods:
- POST
api_description: The site uses a multi-step form system (likely Firmstep/Granicus)
  where an initial lookup by postcode returns a list of addresses/UPRNs, followed
  by a form submission to retrieve the specific collection dates.
api_headers:
  Content-Type: application/x-www-form-urlencoded
api_payload_example: postcode=PR6+7PG&address_select=100010382247&next=Next
response_format: html
bin_selector: table tr
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '100010382247'
  postcode: PR6 7PG
