council: MeltonBoroughCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://my.melton.gov.uk/set-location?id={uprn}&redirect=collections&rememberloc=
api_methods:
- GET
api_description: Passes the UPRN in a GET request which sets the location and redirects
