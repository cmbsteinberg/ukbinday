council: StroudDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www.stroud.gov.uk/apps/my-property-details?uprn={uprn}
api_methods:
- GET
api_description: The council website uses a UPRN lookup to a property details page
  which contains the bin collection schedule in the HTML.
response_format: html
bin_selector: h2#rubbish-header + ul.list-group li
date_format: '%A %d %B %Y'
test_inputs:
  uprn: '100120512183'
  postcode: GL10 3BH
