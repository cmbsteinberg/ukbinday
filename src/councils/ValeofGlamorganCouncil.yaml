council: ValeofGlamorganCouncil
request_type: id_lookup_then_api
required_user_input:
- uprn
api_urls:
- https://myvale.valeofglamorgan.gov.uk/getdata.aspx
- https://www.valeofglamorgan.gov.uk/en/living/Recycling-and-Waste/collections/Black-Bag-Collections/{bin_week}.aspx
api_methods:
- GET
api_description: The workflow first queries a JSONP endpoint using the UPRN to find
  the 'roundday_residual' (e.g., 'Monday-Week-1'). This value is used to construct
  a URL for a secondary HTML page containing a schedule table for that specific round.
  Additionally, a weekly collection type is identified from the JSON response.
response_format: html
bin_selector: table.TableStyle_Activities tbody tr
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '64029020'
