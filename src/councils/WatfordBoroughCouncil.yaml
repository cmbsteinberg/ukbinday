api_description: The workflow first authenticates by calling the isauthenticated endpoint
  to retrieve an 'auth-session' token (sid). This token is then passed as a query
  parameter to the runLookup API endpoint. The request body contains the user's UPRN.
  The response returns a JSON object containing an HTML snippet (dispHTML) which is
  parsed for collection details.
