council: OadbyAndWigstonBoroughCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://my.oadby-wigston.gov.uk/location?put=ow{uprn}&rememberme=0&redirect=%2F
api_methods:
- GET
api_description: GET request to the location endpoint with the UPRN prefixed by 'ow'.
  The response returns HTML containing a list of bin collections.
response_format: html
bin_selector: ul.refuse li
date_format: '%A %d %b'
test_inputs:
  uprn: '10010149102'
