council: GooglePublicCalendarCouncil
request_type: single_api
required_user_input:
- url
api_urls:
- '{url}'
api_methods:
- GET
api_description: The council provides a public iCalendar (ICS) feed. The script fetches
  the events from the provided URL, usually within a 60-day window, and extracts the
  event summary as the bin type and the event start date as the collection date.
response_format: xml
date_format: '%d/%m/%Y'
