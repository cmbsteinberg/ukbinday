council: BrentCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://recyclingservices.brent.gov.uk/waste
- https://recyclingservices.brent.gov.uk/waste/{address_id}
api_methods:
- POST
- GET
api_description: First, POST the postcode to the waste endpoint to retrieve a list
  of address options. Filter the options by the house number (paon) to extract the
  address_id. Then, perform a GET request on the specific address URL. The page uses
  a loading state, so repeated GET requests may be necessary until the data is populated.
response_format: html
bin_selector: div.waste__collections h3.waste-service-name
date_format: '%A, %d %B'
test_inputs:
  postcode: HA3 0QU
