council: SouthRibbleCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://forms.chorleysouthribble.gov.uk/xfp/form/70
api_methods:
- POST
api_description: The site uses a multi-step form process. First, it requests a token
  and page ID from the initial GET request. Then, it posts the postcode to retrieve
  an address selection list. Finally, it posts the selected UPRN to retrieve a table
  containing the bin collection dates.
response_format: html
bin_selector: table.data-table tbody tr
date_format: dd/mm/yy
test_inputs:
  uprn: '10013243496'
  postcode: PR266QW
