council: FermanaghOmaghDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://fermanaghomagh.isl-fusion.com/address/
- https://fermanaghomagh.isl-fusion.com/calendar/
api_methods:
- GET
api_description: First, search for the address using the postcode to retrieve a JSON
  object containing HTML links for properties. Extract the property ID from the 'href'
  attribute. Then, use that ID and the current date to fetch the bin collection calendar
  from the calendar endpoint.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  postcode: BT74 6DQ
