council: IslingtonCouncil
request_type: single_api
required_user_input:
- uprn
- postcode
api_urls:
- https://www.islington.gov.uk/your-area
api_methods:
- GET
api_description: The council's 'Your Area' page returns collection details based on
  UPRN and Postcode query parameters. It parses a list of collection services and
  calculates the next date based on the day of the week mentioned in the text.
response_format: html
bin_selector: div.m-toggle-content ul li
date_format: DD/MM/YYYY
test_inputs:
  uprn: '5300094897'
  postcode: N1 1XR
