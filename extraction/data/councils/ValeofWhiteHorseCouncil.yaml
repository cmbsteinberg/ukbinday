council: ValeofWhiteHorseCouncil
request_type: single_api
required_user_input:
- custom_component_show_url_field
- skip_get_url
- uprn
api_urls:
- https://eform.whitehorsedc.gov.uk/ebase/BINZONE_DESKTOP.eb
api_methods:
- GET
api_description: The site uses a cookie named SVBINZONE containing the UPRN in the
  format VALE%3AUPRN%40{uprn} to return the bin schedule. It takes a query parameter
  SOVA_TAG=VALE.
response_format: html
bin_selector: div.bintxt
date_format: '%A %d %B -'
test_inputs:
  uprn: '100121391443'
