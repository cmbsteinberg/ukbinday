council: MertonCouncil
request_type: single_api
required_user_input:
- uprn
- skip_get_url
api_urls:
- https://fixmystreet.merton.gov.uk/waste/{uprn}?page_loading=1
api_methods:
- GET
api_description: The scraper queries the Merton FixMyStreet waste endpoint with a
  UPRN. It uses a polling mechanism to wait for the loading indicator to disappear,
  as the site loads bin data dynamically.
response_format: html
bin_selector: div.waste__collections
date_format: '%d %B %Y'
test_inputs:
  uprn: '4328213'
