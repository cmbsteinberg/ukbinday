council: ChelmsfordCityCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://www.chelmsford.gov.uk/bins-and-recycling/check-your-collection-day/?14532_keyword={postcode}
- https://www.chelmsford.gov.uk/bins-and-recycling/check-your-collection-day/{day}-{letter}-collection-calendar/
api_methods:
- GET
- GET
api_description: The first request performs a search using the postcode. The resulting
  HTML page contains a table of addresses with their corresponding collection day
  and schedule group (e.g., Tuesday B). Using this day and group, a second GET request
  is made to a specific calendar URL to retrieve the ICS file link.
api_headers:
  User-Agent: Mozilla/5.0
  Accept: text/html
response_format: html
date_format: '%d/%m/%Y'
test_inputs:
  postcode: CM3 7AE
