council: WrexhamCountyBoroughCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://myaccount.wrexham.gov.uk/apibroker/runLookup?id=5a3bcc9448f28
- https://myaccount.wrexham.gov.uk/apibroker/runLookup?id=5beab9a792bb5
api_methods:
- POST
api_description: The site uses the 'AchieveForms' (Granicus) platform. It involves
  a lookup for addresses based on postcode followed by a specific lookup for collection
  details using the UPRN.
api_headers:
  content-type: application/json
  X-Requested-With: XMLHttpRequest
api_payload_example: '{"stopOnFailure":true,"stage_id":"AF-Stage-854336b9-1221-4e6a-88d7-785fb2f8e340","formValues":{"Section
  1":{"UPRN":{"value":"200002944225"},"NoWeeks":{"value":"4"}}},"tokens":{"csrf_token":"7ed0f664d2fd0b966afcb5fd87d6ebad0332ca36"}}'
response_format: html
bin_selector: '#wcbc_collection_details tr'
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '200002944225'
  postcode: LL12 7RW
