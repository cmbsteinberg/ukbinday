council: SouthTynesideCouncil
request_type: single_api
required_user_input:
- house_number
- postcode
- skip_get_url
api_urls:
- https://www.southtyneside.gov.uk/apiserver/ajaxlibrary/
api_methods:
- POST
api_description: '[AUTO-CORRECTED from id_lookup_then_api] First call uses stc.common.snippets.getAddressList
