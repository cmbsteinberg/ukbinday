council: HackneyCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://waste-api-hackney-live.ieg4.net/f806d91c-e133-43a6-ba9a-c0ae4f4cccf6/property/opensearch
- https://waste-api-hackney-live.ieg4.net/f806d91c-e133-43a6-ba9a-c0ae4f4cccf6/alloywastepages/getproperty/{systemId}
- https://waste-api-hackney-live.ieg4.net/f806d91c-e133-43a6-ba9a-c0ae4f4cccf6/alloywastepages/getbin/{binID}
- https://waste-api-hackney-live.ieg4.net/f806d91c-e133-43a6-ba9a-c0ae4f4cccf6/alloywastepages/getcollection/{binID}
- https://waste-api-hackney-live.ieg4.net/f806d91c-e133-43a6-ba9a-c0ae4f4cccf6/alloywastepages/getworkflow/{collectionID}
api_methods:
- POST
- GET
api_description: The process involves a postcode lookup to find a property systemId,
  then fetching property details to get container IDs. Each container ID is used to
  fetch the bin type and its associated workflow ID (schedule), which finally provides
  the collection dates.
response_format: json
date_format: '%Y-%m-%dT%H:%M:%SZ'
test_inputs:
  postcode: N16 9AS
