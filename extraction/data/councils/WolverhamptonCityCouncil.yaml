council: WolverhamptonCityCouncil
request_type: single_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www.wolverhampton.gov.uk/find-my-nearest/{postcode}/{uprn}
api_methods:
- GET
api_description: Takes the postcode and UPRN directly in the URL to return a page
  containing bin collection schedules.
response_format: html
bin_selector: div.jumbotron-fluid div.col-md-4
date_format: '%B %d, %Y'
test_inputs:
  uprn: '100071205205'
  postcode: WV3 9NZ
