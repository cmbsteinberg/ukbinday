council: SwanseaCouncil
request_type: single_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www1.swansea.gov.uk/recyclingsearch/
api_methods:
- POST
api_description: Submits a POST request to the Swansea Council recycling search page
  with ASP.NET viewstate variables, postcode, and UPRN (passed via txtRoadName). It
  then parses the resulting HTML for next collection dates.
response_format: html
bin_selector: span#lblNextRefuse, span#lblNextRecycling
date_format: dd/mm/yyyy
test_inputs:
  uprn: '100100324821'
  postcode: SA43PQ
