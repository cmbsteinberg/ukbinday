council: WychavonDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://selfservice.wychavon.gov.uk/sw2AddressLookupWS/jaxrs/PostCode?simple=T&pcode={postcode}&authority=WDC&historical=
- https://selfservice.wychavon.gov.uk/wdcroundlookup/HandleSearchScreen
api_methods:
- GET
- POST
api_description: A GET request to the AddressLookup service retrieves a list of addresses/UPRNs.
  A subsequent POST request to HandleSearchScreen submits the selected UPRN to retrieve
  the bin collection details.
api_headers:
  content-type: application/x-www-form-urlencoded
api_payload_example: nmalAddrtxt=WR3+7RU&alAddrsel=100120716273&txtPage=std&txtSearchPerformedFlag=false&futuredate=&errstatus=&address=All+Seasons%2C+Danes+Green%2C+Claines%2C+WORCESTER&jsenabled=TsOkrIPJrqo5nVGVChHj&btnSubmit=Next
response_format: html
bin_selector: table tbody tr
date_format: dd/mm/yyyy
test_inputs:
  uprn: '100120716273'
  postcode: WR3 7RU
