council: SouthamptonCityCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.southampton.gov.uk/whereilive/waste-calendar
api_methods:
- GET
api_description: A single GET request to the council's waste calendar page using the
  UPRN as a query parameter. The response contains the calendar HTML which is then
  parsed using regex.
response_format: html
bin_selector: (Glass|Recycling|General Waste|Garden Waste).*?([0-9]{1,2}\/[0-9]{1,2}\/[0-9]{4})
date_format: '%m/%d/%Y'
test_inputs:
  uprn: '100060731893'
