council: AberdeenshireCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://online.aberdeenshire.gov.uk/Apps/Waste-Collections/Routes/Route/{uprn}
api_methods:
- GET
api_description: A direct GET request to the council's waste collection route page
  using the UPRN. The response returns an HTML table containing collection dates and
  bin types.
response_format: html
bin_selector: table tbody tr
date_format: '%d/%m/%Y %A'
test_inputs:
  uprn: '151176430'
