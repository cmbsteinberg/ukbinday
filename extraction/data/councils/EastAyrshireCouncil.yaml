council: EastAyrshireCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.east-ayrshire.gov.uk/Housing/RubbishAndRecycling/Collection-days/ViewYourRecyclingCalendar.aspx?r={uprn}
api_methods:
- GET
api_description: Takes the UPRN and makes a GET request to the council's recycling
  calendar page. The response is HTML containing bin collection dates inside <time>
  elements.
response_format: html
bin_selector: time
date_format: '%Y-%m-%d'
test_inputs:
  uprn: '127074727'
