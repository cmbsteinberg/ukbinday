council: CrawleyBoroughCouncil
request_type: token_then_api
required_user_input:
- house_number
- uprn
api_urls:
- https://crawleybc-self.achieveservice.com/authapi/isauthenticated
- https://crawleybc-self.achieveservice.com/apibroker/
api_methods:
- GET
- POST
api_description: First, a GET request is made to the authentication URL to obtain
  an 'auth-session' ID. This SID is then passed as a query parameter to a POST request
  targeting the apibroker endpoint with a JSON payload containing the UPRN and current
  date to retrieve the collection schedule.
response_format: json
date_format: '%A %d %B'
test_inputs:
  uprn: '100061785321'
