council: WaverleyBoroughCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
- paon
api_urls:
- https://wav-wrp.whitespacews.com/
- https://wav-wrp.whitespacews.com/mop.php
api_methods:
- GET
- POST
api_description: The script first accesses the root URL to extract a session 'Track'
  ID. It then performs a POST request with the postcode to initialize the session.
  Finally, it uses a GET request with a 'pIndex' (derived from house number/paon)
  to retrieve bin collection details from the results page.
response_format: html
bin_selector: u1.displayinlineblock.justifycontentleft.alignitemscenter.margin0.padding0
date_format: '%d/%m/%Y'
test_inputs:
  postcode: GU9 9QG
