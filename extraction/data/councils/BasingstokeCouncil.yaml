council: BasingstokeCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.basingstoke.gov.uk/bincollections
api_methods:
- GET
api_description: The council website uses a session cookie named 'WhenAreMyBinsCollected'
  which holds the UPRN. Sending a GET request with this cookie returns the collection
  schedule in HTML format.
response_format: html
bin_selector: div#rteelem_ctl03_pnlCollections_Refuse li, div#rteelem_ctl03_pnlCollections_Recycling
  li, div#rteelem_ctl03_pnlCollections_Glass li, div#rteelem_ctl03_pnlCollections_GardenWaste
  li, div#rteelem_ctl03_pnlCollections_Food li
date_format: '%d %B %Y'
test_inputs:
  uprn: '100060220926'
