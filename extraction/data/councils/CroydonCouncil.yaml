council: CroydonCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://service.croydon.gov.uk/wasteservices/w/webpage/bin-day-enter-address
- https://service.croydon.gov.uk/wasteservices/w/webpage/your-bin-collection-details
api_methods:
- GET
- POST
api_description: The site uses a session-based multi-step form. First, a GET request
  initializes the session and retrieves a `form_check_ajax` token. A POST request
  then performs an address search using the postcode to retrieve a list of address
  IDs. A final POST request submits the selected address ID, which redirects the session
  to a details page containing the bin collection dates.
api_headers:
  content-type: application/x-www-form-urlencoded; charset=UTF-8
  X-Requested-With: XMLHttpRequest
api_payload_example: code_action=search&code_params=%7B%22search_item%22%3A%22SE25+5DW%22%2C%22is_ss%22%3Atrue%7D&fragment_action=handle_event&fragment_id=PCF0020408EECEC1&fragment_collection_class=formtable&form_check_ajax=50fbda308e9c8b4ca643a5a9c50ae75aba728057
response_format: html
bin_selector: '#mats_content_wrapper .listing_template_record'
date_format: '%A %d %B %Y'
test_inputs:
  postcode: SE25 5DW
