council: UttlesfordDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://bins.uttlesford.gov.uk/
- https://bins.uttlesford.gov.uk/index.php
api_methods:
- POST
api_description: The site uses a multi-step POST form. First, the postcode is submitted
  to retrieve a list of addresses (housenn). Then, the specific address selection
  is POSTed to the index.php script to display the results page containing collection
  dates.
api_headers:
  Content-Type: application/x-www-form-urlencoded
  Origin: https://bins.uttlesford.gov.uk
  Referer: https://bins.uttlesford.gov.uk/
api_payload_example: postcode=CM23+5QF&housenn=72%2C+Birchanger+Lane&submit=View+your+waste+collection+days
response_format: html
bin_selector: div.wrap table tbody tr
date_format: '%A %d %B'
test_inputs:
  uprn: '100090643434'
  postcode: CM23 5QF
