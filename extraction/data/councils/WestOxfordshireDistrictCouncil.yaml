council: WestOxfordshireDistrictCouncil
request_type: selenium
required_user_input:
- house_number
- postcode
status: not_implemented
notes: Requires Playwright/Selenium automation - not yet implemented as HTTP requests
api_description: The process uses the Salesforce Lightning Aura framework. First,
  a lookup request is sent with the address string to obtain a property ID (e.g.,
  'a0K0X00000FCFMTUA5'). This ID is then passed into a series of 'navigateFlow' POST
  requests that advance a Salesforce Screen Flow ('WebFormAlloyWasteCollectionEnquiry')
  to the final screen containing the collection dates.
test_inputs:
  postcode: OX28 1YA
