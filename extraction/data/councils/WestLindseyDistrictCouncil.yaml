council: WestLindseyDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://wlnk.statmap.co.uk/map/Cluster.svc/findLocation
- https://wlnk.statmap.co.uk/map/Cluster.svc/getpage
api_methods:
- GET
api_description: First API call uses an address string to find location coordinates
  (X, Y) and an internal Address ID. The second API call uses these coordinates and
  ID to fetch a Javascript-wrapped HTML snippet containing bin collection schedules.
response_format: json
bin_selector: li.auroraListItem li
date_format: dd/mm
test_inputs:
  postcode: LN8 3AX
