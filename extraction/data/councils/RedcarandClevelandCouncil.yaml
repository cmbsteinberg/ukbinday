council: RedcarandClevelandCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://api.eu.recollect.net/api/areas/RedcarandClevelandUK/services/50006/address-suggest
- https://api.eu.recollect.net/api/places/{place_id}/services/50006/events
api_methods:
- GET
api_description: First looks up the address ID using a postcode and house number,
  then uses that ID to query the collection events for the next 30 days via the Recollect
  API.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  postcode: TS10 2RE
