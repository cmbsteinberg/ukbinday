council: CardiffCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://authwebservice.cardiff.gov.uk/AuthenticationWebService.asmx?op=GetJWT
- https://api.cardiff.gov.uk/WasteManagement/api/WasteCollection
api_methods:
- POST
- POST
api_description: The workflow first requests a JWT token via a SOAP POST request to
  the AuthenticationWebService. This token is then used as a Bearer Auth token in
  a second POST request to the WasteCollection API, passing the UPRN in a JSON payload.
response_format: json
bin_selector: collectionWeeks
date_format: '%Y-%m-%dT%H:%M:%S'
test_inputs:
  uprn: '100100112419'
