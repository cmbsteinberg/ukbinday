council: EastLothianCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://collectiondates.eastlothian.gov.uk/ajax/your-calendar/load-streets-summer-2025.asp
- https://collectiondates.eastlothian.gov.uk/ajax/your-calendar/load-recycling-summer-2025.asp
api_methods:
- GET
- GET
api_description: First call searches for streets using a postcode to retrieve a list
  of addresses and their internal IDs. The second call uses the selected address ID
  to retrieve the specific bin collection schedule.
response_format: html
bin_selector: div.calendar-item
date_format: '%A %d %B %Y'
test_inputs:
  postcode: EH21 6QA
