  via the Salesforce Lightning Aura API.
response_format: json
bin_selector: actions[0].returnValue.returnValue.serviceUnits
date_format: '%Y-%m-%dT%H:%M:%S.%f%z'
test_inputs:
  uprn: '74008234'
