council: LondonBoroughHounslow
request_type: token_then_api
required_user_input:
- skip_get_url
- uprn
api_urls:
- https://my.hounslow.gov.uk/authapi/isauthenticated?uri=https%253A%252F%252Fmy.hounslow.gov.uk%252Fservice%252FWaste_and_recycling_collections&hostname=my.hounslow.gov.uk&withCredentials=true
- https://my.hounslow.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, the script calls a session URL to obtain an 'auth-session'
  ID. It then uses this ID to POST to the runLookup endpoint (ID 655f4290810cf) to
  retrieve a 'bartecToken'. Finally, it makes another POST request to runLookup (ID
  659eb39b66d5a) containing the UPRN, bartecToken, and a date range to retrieve the
  JSON collection schedule.
response_format: json
date_format: YYYY-MM-DD
test_inputs:
  uprn: '100021577765'
