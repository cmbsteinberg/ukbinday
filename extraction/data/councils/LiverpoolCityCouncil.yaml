council: LiverpoolCityCouncil
request_type: single_api
required_user_input:
- uprn
- skip_get_url
api_urls:
- https://liverpool.gov.uk/Bins/BinDatesTable?UPRN={uprn}
api_methods:
- GET
api_description: Calls a specific URL with the UPRN appended as a query parameter
  to retrieve an HTML table of bin collection dates.
response_format: html
bin_selector: tr
date_format: '%A, %d %B'
test_inputs:
  uprn: '38164600'
