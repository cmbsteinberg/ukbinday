council: SouthStaffordshireDistrictCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.sstaffs.gov.uk/bin-collection-dates?uprn={uprn}
api_methods:
- GET
api_description: '[AUTO-CORRECTED from id_lookup_then_api] The council website takes
