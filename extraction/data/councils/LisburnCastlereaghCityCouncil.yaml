council: LisburnCastlereaghCityCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://lisburn.isl-fusion.com/address/{postcode}
- https://lisburn.isl-fusion.com/calendar/{property_id}/{date}
api_methods:
- GET
api_description: First, retrieve a list of addresses in HTML format wrapped in a JSON
  response for the given postcode. Extract the property ID from the href attributes.
  Finally, query the calendar endpoint using the extracted property ID and current
  date to get the collection schedule.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  postcode: BT28 1JN
