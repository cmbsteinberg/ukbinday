council: BirminghamCityCouncil
request_type: token_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www.birmingham.gov.uk/xfp/form/619
api_methods:
- POST
api_description: First, a GET request is made to the form URL to extract a CSRF token
  (__token). Then, a POST request is sent with the token, postcode, and uprn to retrieve
  the collection table.
response_format: html
bin_selector: table.data-table tbody tr
date_format: '%a %d/%m/%Y'
test_inputs:
  uprn: '100070445256'
  postcode: B5 7XE
