council: ExeterCityCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://exeter.gov.uk/repositories/hidden-pages/address-finder/?qsource=UPRN&qtype=bins&term={uprn}
api_methods:
- GET
api_description: Takes a UPRN and returns a JSON array where the first element contains
  an HTML string in the 'Results' key with bin collection dates.
response_format: json
bin_selector: h2
date_format: '%A, %d %B %Y'
test_inputs:
  uprn: '100040212270'
