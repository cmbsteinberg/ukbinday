council: MidlothianCouncil
request_type: single_api
required_user_input:
- house_number
- postcode
- skip_get_url
api_urls:
- https://www.midlothian.gov.uk/site/scripts/directory_search.php
api_methods:
- GET
api_description: '[AUTO-CORRECTED from id_lookup_then_api] First queries the directory
  search using the postcode to find a list of address links. It then matches the provided
  house number/name against the results to find the specific property URL, and finally
  scrapes that property page for bin collection dates.'
response_format: html
bin_selector: ul.data-table li
date_format: '%A %d/%m/%Y'
test_inputs:
  postcode: EH19 2EB
