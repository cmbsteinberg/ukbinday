council: CheshireEastCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://online.cheshireeast.gov.uk/MyCollectionDay/SearchByAjax/GetBartecJobList?uprn={uprn}
api_methods:
- GET
api_description: Fetches bin collection data directly using the UPRN in a GET request
