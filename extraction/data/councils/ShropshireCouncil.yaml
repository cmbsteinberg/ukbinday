council: ShropshireCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- paon
api_urls:
- https://shropshire.gov.uk/binday
- https://bins.shropshire.gov.uk/property/{address_id}
api_methods:
- POST
- GET
api_description: The first step involves submitting a postcode to the binday endpoint
  to retrieve a list of Address IDs (UPRNs). Selecting the specific address redirects
  the user to a property-specific URL (e.g., bins.shropshire.gov.uk/property/100070034731)
  which contains the collection data in the HTML response.
api_headers:
  Content-Type: application/x-www-form-urlencoded
  User-Agent: Mozilla/5.0
api_payload_example: Postcode=SY1+1PL&AddressId=100070034731
response_format: html
bin_selector: div.container.results-table-wrapper tbody tr
date_format: '%d/%m/%Y'
