council: RoyalBoroughofGreenwich
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://www.royalgreenwich.gov.uk/site/custom_scripts/apps/waste-collection/new2023/source.php?term={postcode}
- https://www.royalgreenwich.gov.uk/site/custom_scripts/repo/apps/waste-collection/new2023/ajax-response-uprn.php
api_methods:
- GET
- POST
api_description: The council uses a two-step API process. First, it searches for the
  address string using the postcode. Then, it posts the selected address string to
  a second endpoint to retrieve the collection day and frequency (Week A or Week B).
  The results are then calculated locally based on fixed start dates.
response_format: json
date_format: '%d/%m/%Y'
test_inputs:
  postcode: BR7 6DN
