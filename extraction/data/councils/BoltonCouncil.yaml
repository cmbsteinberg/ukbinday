council: BoltonCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://web.bolton.gov.uk/bins.aspx
api_methods:
- POST
api_description: The site uses standard ASP.NET WebForms postbacks. It requires a
  GET request to fetch the initial __VIEWSTATE and __EVENTVALIDATION, followed by
  a POST to search for addresses by postcode, and a final POST using the selected
  UPRN to retrieve the collection data.
api_headers:
  content-type: application/x-www-form-urlencoded
  referer: https://web.bolton.gov.uk/bins.aspx
api_payload_example: __EVENTTARGET=ddlAddresses&__EVENTARGUMENT=&__LASTFOCUS=&__VIEWSTATE=...&__VIEWSTATEGENERATOR=EABFF864&__EVENTVALIDATION=...&txtPostcode=BL1+5PQ&ddlAddresses=100010886936
response_format: html
bin_selector: div.bin-info
date_format: '%A %d %B %Y'
test_inputs:
  uprn: '100010886936'
  postcode: BL1 5PQ
