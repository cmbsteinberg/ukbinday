council: BolsoverCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://selfservice.bolsover.gov.uk/authapi/isauthenticated?uri=https%253A%252F%252Fselfservice.bolsover.gov.uk%252Fservice%252FCheck_your_Bin_Day&hostname=selfservice.bolsover.gov.uk&withCredentials=true
- https://selfservice.bolsover.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, a GET request is made to the authentication endpoint to obtain
  a session ID (auth-session). Then, a POST request is sent to the runLookup endpoint
  with the session ID as a parameter and the UPRN in the JSON body to retrieve bin
  collection route information.
response_format: json
date_format: dd/mm/YYYY
test_inputs:
  uprn: '100030066827'
