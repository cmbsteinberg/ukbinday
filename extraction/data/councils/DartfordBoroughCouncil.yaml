council: DartfordBoroughCouncil
request_type: single_api
required_user_input:
- uprn
- skip_get_url
api_urls:
- https://windmz.dartford.gov.uk/ufs/WS_CHECK_COLLECTIONS.eb?UPRN={uprn}
api_methods:
- GET
api_description: Fetches bin collection data directly using the UPRN via a URL parameter.
  The response is HTML containing a table with bin types and dates.
response_format: html
bin_selector: table.eb-EVDNdR1G-tableContent tr.eb-EVDNdR1G-tableRow
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '100060861698'
