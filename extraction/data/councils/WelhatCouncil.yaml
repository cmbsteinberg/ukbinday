council: WelhatCouncil
request_type: token_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www.welhat.gov.uk/xfp/form/214
api_methods:
- POST
api_description: The workflow first extracts a CSRF __token from the initial form
  page and then submits the postcode and uprn via a POST request to retrieve a table
  of bin collection dates.
response_format: html
bin_selector: table tr
date_format: '%A %d %B  %Y'
test_inputs:
  uprn: '100080982825'
  postcode: AL8 6HQ
