council: SouthHamsDistrictCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://waste.southhams.gov.uk/mycollections
- https://waste.southhams.gov.uk/mycollections/getcollectiondetails
api_methods:
- GET
- POST
api_description: Initial GET request to /mycollections retrieves a session cookie
  (fcc_session_cookie). This token is then passed along with the UPRN in a POST request
  to /getcollectiondetails as form-encoded data. The response contains JSON with HTML
  snippets representing bin tiles.
response_format: json
bin_selector: .collectionDiv
date_format: '%A, %d %B %Y'
test_inputs:
  uprn: '10004742851'
