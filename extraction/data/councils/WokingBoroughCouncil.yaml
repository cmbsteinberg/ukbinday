council: WokingBoroughCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
- skip_get_url
api_urls:
- https://asjwsw-wrpwokingmunicipal-live.whitespacews.com/
api_methods:
- POST
api_description: The workflow scrapes a session-based URL from the homepage, submits
