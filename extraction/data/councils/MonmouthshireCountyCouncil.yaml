council: MonmouthshireCountyCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://maps.monmouthshire.gov.uk/?action=SetAddress&UniqueId={uprn}
api_methods:
- GET
api_description: The council website takes a UPRN via a query parameter and returns
  an HTML page containing waste collection details within a specific ARIA-labeled
  div.
response_format: html
bin_selector: div[aria-label='Waste Collections'] .atPanelContent
date_format: '%A %d %B'
test_inputs:
  uprn: '100100266220'
