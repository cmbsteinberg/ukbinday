council: NewhamCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://bincollection.newham.gov.uk/Details/Index/{uprn}
api_methods:
- GET
api_description: The script constructs a URL using the UPRN and parses the returned
  HTML to find bin collection dates.
response_format: html
bin_selector: div.card.h-100
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '46077811'
