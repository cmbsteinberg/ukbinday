council: LutonBoroughCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://myforms.luton.gov.uk/authapi/isauthenticated?uri=https%253A%252F%252Fmyforms.luton.gov.uk%252Fservice%252FFind_my_bin_collection_date&hostname=myforms.luton.gov.uk&withCredentials=true
- https://myforms.luton.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, a GET request is made to the authentication endpoint to retrieve
  a session ID (sid) from the 'auth-session' field. This sid is then used as a query
  parameter in a POST request to the runLookup API. The POST body contains the UPRN
  in a specific formValues structure. The response contains HTML content within a
  JSON object which is then parsed.
response_format: json
bin_selector: tr
date_format: '%A %d %b %Y'
test_inputs:
  uprn: '100080155778'
