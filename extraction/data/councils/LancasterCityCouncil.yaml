council: LancasterCityCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- postcode
- skip_get_url
api_urls:
- https://lcc-wrp.whitespacews.com
api_methods:
- GET
- POST
api_description: Initial GET to the base URL finds the portal link (seq=1). A POST
  request with address details identifies the property (seq=3). A final GET to the
  property link retrieves the HTML containing the collection schedule.
response_format: html
bin_selector: section#scheduled-collections li
date_format: '%d/%m/%Y'
test_inputs:
  postcode: LA1 1RS
