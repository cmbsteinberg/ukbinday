council: NorthLanarkshireCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.northlanarkshire.gov.uk/bin-collection-dates/000118016164/48402118
api_methods:
- GET
api_description: The website renders bin collection data directly into the HTML based
  on the UPRN provided in the URL path.
api_headers:
  Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
  User-Agent: Mozilla/5.0
response_format: html
bin_selector: div[class^=waste-type-container]
date_format: '%d %B %Y'
