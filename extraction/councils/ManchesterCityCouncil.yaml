council: ManchesterCityCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://manchester.form.uk.empro.verintcloudservices.com/api/citizen?archived=Y&preview=false&locale=en
- https://manchester.form.uk.empro.verintcloudservices.com/api/custom?action=bin_checker-get_bin_col_info&actionedby=_KDF_custom&loadform=true&access=citizen&locale=en
api_methods:
- GET
- POST
api_description: First, a GET request is made to the AUTH_URL to retrieve an 'Authorization'
  token from the response headers. Then, a POST request is made to the API_URL with
  the UPRN and a date range to retrieve bin collection dates.
response_format: json
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '77127089'
