council: EastStaffordshireBoroughCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.eaststaffsbc.gov.uk/bin-collection-dates?uprn={uprn}
api_methods:
- GET
api_description: The URL with the UPRN query parameter returns the bin collection
  data directly in the HTML response.
api_headers:
  User-Agent: Mozilla/5.0
  Accept: text/html
response_format: html
bin_selector: div.collection-next, li
date_format: '%d/%m/%Y'
