council: BarkingDagenham
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://www.lbbd.gov.uk/rubbish-recycling/household-bin-collection/check-your-bin-collection-days
api_methods:
- POST
api_description: The site uses a standard address lookup form. Typically, the first
  request posts the postcode to retrieve a list of address IDs (UPRNs), and the second
  request posts the selected address ID to retrieve the bin collection container data.
api_headers:
  Content-Type: application/x-www-form-urlencoded
api_payload_example: postcode=RM6+6XH&address=10002135678&op=Search
response_format: html
bin_selector: div.bin--row:not(:first-child)
date_format: '%d/%m/%Y'
test_inputs:
  postcode: RM6 6XH
