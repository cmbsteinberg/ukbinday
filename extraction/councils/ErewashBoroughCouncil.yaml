council: ErewashBoroughCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.erewash.gov.uk/bbd-whitespace/one-year-collection-dates-without-christmas?uprn={uprn}
api_methods:
- GET
api_description: Fetches a JSON payload containing collection dates for a specific
  UPRN. The payload is extracted from a 'settings' command within the JSON array and
  mapped using a service identifier dictionary.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  uprn: '10003582028'
