council: HorshamDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www.horsham.gov.uk/waste-recycling-and-bins/household-bin-collections/check-your-bin-collection-day
api_methods:
- POST
api_description: The site uses a standard .NET web form (ViewState) or a sequential
  POST lookup. It involves submitting a postcode to a form and then submitting the
  selected address/UPRN to retrieve the final table.
api_headers:
  Content-Type: application/x-www-form-urlencoded
  User-Agent: Mozilla/5.0
api_payload_example: Postcode=RH12+1AA&Submit1=Submit&__VIEWSTATE=...&__EVENTVALIDATION=...
response_format: html
bin_selector: //th[contains(text(),'COLLECTION TYPE')]/ancestor::table
date_format: '%d/%m/%Y'
test_inputs:
  uprn: 010013792717
  postcode: RH12 1AA
