council: CheltenhamBoroughCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://maps.cheltenham.gov.uk/map/Aurora.svc/RequestSession
- https://maps.cheltenham.gov.uk/map/Aurora.svc/GetWorkflow
- https://maps.cheltenham.gov.uk/map/Aurora.svc/FindLocation
- https://maps.cheltenham.gov.uk/map/Aurora.svc/ExecuteTaskJob
- https://www.cheltenham.gov.uk/bank-holiday-collections
api_methods:
- GET
api_description: The workflow involves initializing a session with Aurora GIS, looking
  up the location ID and USRN/XY coordinates via postcode/UPRN, and then executing
  a series of 'DrillDownTask' and 'FetchResultSetTask' to retrieve the waste collection
  week and day offsets. It also scrapes bank holiday adjustments from the council's
  main website.
response_format: json
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '100120372027'
  postcode: GL51 3NA
