council: RugbyBoroughCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www.rugby.gov.uk/check-your-next-bin-day
api_methods:
- POST
api_description: The site uses standard form submissions on a Liferay portal. It requires
  an initial GET to establish a session and get a CSRF token (p_auth), followed by
  a POST to lookup addresses by postcode, and a final POST with the selected UPRN
  to retrieve the bin schedule.
api_headers:
  Content-Type: application/x-www-form-urlencoded
  User-Agent: Mozilla/5.0
api_payload_example: _com_placecube_digitalplace_local_waste_portlet_CollectionDayFinderPortlet_postcode=CV22+6LA&_com_placecube_digitalplace_local_waste_portlet_CollectionDayFinderPortlet_uprn=100070182634
response_format: html
bin_selector: table.table tbody tr
date_format: '%A %d %b %Y'
test_inputs:
  uprn: '100070182634'
  postcode: CV22 6LA
