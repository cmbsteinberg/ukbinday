council: BurnleyBoroughCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://your.burnley.gov.uk/authapi/isauthenticated
- https://your.burnley.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, a GET request is made to the authentication endpoint to obtain
  a session ID (auth-session). Then, a POST request is sent to the lookup endpoint
  using the UPRN in the formValues payload and the session ID as a query parameter.
  The response contains bin types and dates in the transformed rows_data object.
response_format: json
bin_selector: integration.transformed.rows_data
date_format: '%A %d %B'
test_inputs:
  uprn: '100010347165'
