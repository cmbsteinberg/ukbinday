council: BromleyBoroughCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://recyclingservices.bromley.gov.uk/waste/6087017
api_methods:
- GET
api_description: The main document request returns the HTML structure, and a subsequent
  fetch request with a query parameter seems to load the dynamic content.
api_headers:
  Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36
response_format: html
bin_selector: h3.waste-service-name
date_format: '%d %B'
