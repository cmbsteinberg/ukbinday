council: SpelthorneBoroughCouncil
request_type: token_then_api
required_user_input:
- house_number
- postcode
api_urls:
- https://spelthorne-self.achieveservice.com/authapi/isauthenticated
- https://spelthorne-self.achieveservice.com/apibroker/runLookup
api_methods:
- GET
- POST
api_description: The workflow authenticates to get a session ID (sid). It then calls
  runLookup to find the property UPRN using the postcode, followed by another lookup
  to retrieve a security token. Finally, a POST request is made to a third lookup
  ID using the UPRN, the token, and a date range to retrieve bin collection dates.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  postcode: TW18 2PR
