council: WestBerkshireCouncil
request_type: single_api
required_user_input:
- postcode
- house_number
api_urls:
- https://www.westberks.gov.uk/binday
api_methods:
- POST
api_description: '[AUTO-CORRECTED from id_lookup_then_api] The site uses a multi-step
  form interaction. It likely relies on ASP.NET WebForms (ViewState/EventValidation)
  or a similar stateful framework where a postcode is submitted to get a list of addresses,
  and then an address selection triggers a postback to display the collection dates.'
api_headers:
  Content-Type: application/x-www-form-urlencoded
  User-Agent: Mozilla/5.0
api_payload_example: __VIEWSTATE=...&FINDYOURBINDAYS3WEEKLY_ADDRESSLOOKUPPOSTCODE=RG14
  7DP&FINDYOURBINDAYS3WEEKLY_ADDRESSLOOKUPSEARCH=Search
response_format: html
bin_selector: .rubbish_collection_difs_black, .rubbish_collection_difs_green, .rubbish_collection_difs_purple
date_format: '%A %d %B'
test_inputs:
  postcode: RG14 7DP
