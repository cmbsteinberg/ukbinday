council: PlymouthCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://plymouth-self.achieveservice.com/authapi/isauthenticated
- https://plymouth-self.achieveservice.com/apibroker/runLookup
api_methods:
- GET
- POST
api_description: The workflow first authenticates with a session URL to obtain an
  'auth-session' token (sid). This token is then used as a parameter in a POST request
  to the API broker lookup service. The payload includes the UPRN and the number of
  future collections to retrieve. The response contains transformed row data with
  collection dates and round types.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  uprn: '100040420582'
