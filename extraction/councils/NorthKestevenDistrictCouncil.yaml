council: NorthKestevenDistrictCouncil
request_type: single_api
required_user_input:
- postcode
- uprn
api_urls:
- https://infopoint.n-kesteven.gov.uk/find-my-bins
api_methods:
- POST
api_description: '[AUTO-CORRECTED from id_lookup_then_api] The site uses a two-step
  POST process to find bin data. The first step submits a postcode to retrieve a list
  of UPRNs, and the second step submits the selected UPRN to retrieve the bin schedule.'
api_headers:
  Content-Type: application/x-www-form-urlencoded
api_payload_example: UPRN=100030869513
response_format: html
bin_selector: div[class^="bg-"]
date_format: '%A, %d %B %Y'
test_inputs:
  uprn: '100030869513'
