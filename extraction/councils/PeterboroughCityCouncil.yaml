council: PeterboroughCityCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://report.peterborough.gov.uk/waste
- https://report.peterborough.gov.uk/waste
- https://report.peterborough.gov.uk/waste/PE4%206JJ:100090175173
api_methods:
- POST
- POST
- GET
api_description: The sequence involves submitting a postcode via POST to get a list
  of addresses, then submitting a specific address ID via another POST, which redirects
  (302) to a results page containing the bin collection data.
api_headers:
  content-type: application/x-www-form-urlencoded
api_payload_example: 'postcode=PE4+6JJ

  address=PE4+6JJ%3A100090175173'
response_format: html
bin_selector: div.waste-service-wrapper
date_format: '%A, %d %B %Y'
test_inputs:
  postcode: PE4 6JJ
