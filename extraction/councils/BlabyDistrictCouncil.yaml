council: BlabyDistrictCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://my.blaby.gov.uk/set-location.php?ref={uprn}&redirect=collections
api_methods:
- GET
api_description: Fetches bin collection data by passing the UPRN in a URL parameter
  which sets the location cookie and redirects to the collections page.
response_format: html
bin_selector: .box-item
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '100030401782'
