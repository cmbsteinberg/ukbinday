council: WandsworthCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.wandsworth.gov.uk/my-property/?UPRN={uprn}
api_methods:
- GET
api_description: GET request to the property search page with the UPRN as a query
  parameter. The response is HTML containing the bin collection dates.
response_format: html
bin_selector: h4.collection-heading
date_format: '%A %d %B %Y'
test_inputs:
  uprn: '100022684035'
