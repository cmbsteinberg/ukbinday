council: DudleyCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://my.dudley.gov.uk/authapi/isauthenticated
- https://my.dudley.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, the script calls the isauthenticated endpoint to retrieve
  an auth-session ID (sid). Then, it calls the runLookup API using that sid and the
  provided UPRN to retrieve bin collection dates from the integration rows_data object.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  uprn: '90014244'
