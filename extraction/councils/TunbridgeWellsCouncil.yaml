council: TunbridgeWellsCouncil
request_type: token_then_api
required_user_input:
- uprn
api_urls:
- https://mytwbc.tunbridgewells.gov.uk/authapi/isauthenticated
- https://mytwbc.tunbridgewells.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, a session token is retrieved from the authapi endpoint. This
  token is then used as a 'sid' parameter in a POST request to the runLookup API,
  passing the UPRN in the formValues payload to retrieve collection dates.
response_format: json
bin_selector: integration.transformed.rows_data
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '10090058289'
