api_description: The automation uses an AchieveForms process which usually involves
  multiple stateful POST requests to a back-end form engine. These forms often require
  session tokens, CSRF protection, and complex state management that are difficult
  to replicate with simple requests. While an underlying API (e.g., /AchieveForms/fill/...)
  likely exists, navigating the form stages (lookup -> confirm -> result) without
  a browser context is highly prone to breakage in this environment.
