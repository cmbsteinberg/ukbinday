council: WindsorAndMaidenheadCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://forms.rbwm.gov.uk/bincollections?uprn={uprn}
api_methods:
- GET
api_description: The council's form page appears to render the bin collection data
  directly into the HTML based on a UPRN query parameter. A simple GET request to
  the URL with the UPRN should return the HTML table containing the bin types and
  dates.
api_headers:
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36
response_format: html
bin_selector: div.widget-bin-collections tbody tr
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '100080371082'
