council: GraveshamBoroughCouncil
request_type: token_then_api
required_user_input:
- skip_get_url
- uprn
api_urls:
- https://my.gravesham.gov.uk/authapi/isauthenticated
- https://my.gravesham.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, the script calls an authentication endpoint to obtain a session
  ID (sid). It then calls a lookup endpoint (runLookup) with ID 5ee8854759297 to retrieve
  a tokenString. Finally, it uses both the sid and tokenString along with the UPRN
  and date range to query the final bin collection data via the runLookup endpoint
  (ID 5c8f869376376).
response_format: json
date_format: '%Y-%m-%dT%H:%M:%S'
test_inputs:
  uprn: '100060927046'
