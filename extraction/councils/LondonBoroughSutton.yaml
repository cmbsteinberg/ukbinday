council: LondonBoroughSutton
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://waste-services.sutton.gov.uk/waste/{uprn}
api_methods:
- GET
api_description: Fetches the waste collection schedule page for a specific UPRN. The
  page often requires polling if 'Loading your bin days...' is displayed.
response_format: html
bin_selector: h3
date_format: '%A, %d %B'
test_inputs:
  uprn: '4473006'
