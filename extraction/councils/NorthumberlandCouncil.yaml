council: NorthumberlandCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://bincollection.northumberland.gov.uk/postcode
- https://bincollection.northumberland.gov.uk/address-select
api_methods:
- POST
- POST
api_description: The process involves submitting a postcode to a form which sets a
  session and generates a CSRF token. A second POST request then selects the specific
  address (UPRN) to display the collection schedule.
api_headers:
  content-type: application/x-www-form-urlencoded
api_payload_example: _csrf=drn7oxva-T6MFvCxUolwbCIYTGRvyppJrYuQ&address=010096302588
response_format: html
bin_selector: .govuk-table__row
date_format: '%d %B %Y'
test_inputs:
  uprn: 010096302588
  postcode: NE65 0ZP
