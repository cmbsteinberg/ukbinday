council: BraintreeDistrictCouncil
request_type: token_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://www.braintree.gov.uk/xfp/form/554
api_methods:
- POST
api_description: Initial GET request to form page to extract a CSRF token from the
  __token input. Then a POST request is made using the token, postcode, and UPRN to
  retrieve bin collection dates from the resulting HTML.
response_format: html
bin_selector: div.date_display
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '10006930172'
  postcode: CO5 9BD
