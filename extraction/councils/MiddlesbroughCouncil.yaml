council: MiddlesbroughCouncil
request_type: id_lookup_then_api
required_user_input:
- house_number
- skip_get_url
api_urls:
- https://api.eu.recollect.net/api/areas/MiddlesbroughUK/services/50005/address-suggest
- https://api.eu.recollect.net/api/areas/MiddlesbroughUK/services/50005/pages/en-GB/place_calendar.json
api_methods:
- GET
- GET
api_description: First call looks up the address using the house number to retrieve
  a place_id. The second call uses that place_id in the 'x-recollect-place' header
  to fetch the calendar JSON payload containing the next collection details.
response_format: json
date_format: '%A, %B %d, %Y'
