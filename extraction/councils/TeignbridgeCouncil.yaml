council: TeignbridgeCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.teignbridge.gov.uk/repositories/hidden-pages/bin-finder?uprn={uprn}
api_methods:
- GET
api_description: The bin collection data is rendered directly into the HTML document
  via a server-side request using the UPRN parameter.
api_headers:
  Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8
response_format: html
bin_selector: .binInfoContainer
date_format: '%d %B %Y%A'
test_inputs:
  uprn: '100040338776'
