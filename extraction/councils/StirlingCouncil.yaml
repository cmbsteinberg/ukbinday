council: StirlingCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://www.stirling.gov.uk/Umbraco/Api/Gazetteer/PostcodeLookup?searchall=&searchType=binCollection&postcode=FK9%204QA
- https://www.stirling.gov.uk/bins-and-recycling/bin-collection-dates-search/
api_methods:
- GET
- POST
api_description: The process involves a GET request to look up address details and
  UPRN by postcode, followed by a multi-part form POST request to submit the selected
  address data which redirects to the results page.
api_headers:
  content-type: multipart/form-data
api_payload_example: "------WebKitFormBoundary\r\nContent-Disposition: form-data;\
  \ name=\"searchType\"\r\n\r\nbinCollection\r\n------WebKitFormBoundary\r\nContent-Disposition:\
  \ form-data; name=\"js-postcode-lookup-postcode\"\r\n\r\nFK9 4QA\r\n------WebKitFormBoundary\r\
  \nContent-Disposition: form-data; name=\"Uprn\"\r\n\r\n122014474\r\n------WebKitFormBoundary\r\
  \nContent-Disposition: form-data; name=\"ufprt\"\r\n\r\n0EC1DBCDF1C047ADA906...\
  \ [token from html]\r\n------WebKitFormBoundary--"
response_format: html
bin_selector: li.schedule__item
date_format: '%d/%m/%Y'
test_inputs:
  postcode: FK9 4QA
