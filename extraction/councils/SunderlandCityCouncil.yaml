council: SunderlandCityCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://webapps.sunderland.gov.uk/WEBAPPS/WSS/Sunderland_Portal/Forms/bindaychecker.aspx
api_methods:
- GET
- POST
api_description: The site uses a standard ASP.NET WebForms pattern. It requires an
  initial GET to obtain session state (__VIEWSTATE), followed by a POST to lookup
  addresses by postcode, and a final POST with the selected address ID (UPRN) to retrieve
  bin collection dates.
api_headers:
  content-type: application/x-www-form-urlencoded
api_payload_example: ToolkitScriptManager2_HiddenField=&__EVENTTARGET=ctl00%24ContentPlaceHolder1%24ddlAddresses&__EVENTARGUMENT=&__VIEWSTATE=[DYNAMIC_TOKEN]&__VIEWSTATEGENERATOR=EE7C1293&__EVENTVALIDATION=[DYNAMIC_TOKEN]&ctl00%24ContentPlaceHolder1%24tbPostCode%24controltext=SR4+6BJ&ctl00%24ContentPlaceHolder1%24ddlAddresses=LPI001TM8BBLI000
response_format: html
bin_selector: '#ContentPlaceHolder1_LabelHouse, #ContentPlaceHolder1_LabelRecycle'
date_format: '%A %d %B %Y'
test_inputs:
  postcode: SR4 6BJ
