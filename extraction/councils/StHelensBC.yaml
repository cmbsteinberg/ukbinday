council: StHelensBC
request_type: single_api
required_user_input:
- postcode
- house_number
api_urls:
- https://www.sthelens.gov.uk/apiserver/formsservice/http/processsubmission
api_methods:
- POST
api_description: '[AUTO-CORRECTED from id_lookup_then_api] A series of form submissions
  to a central forms service API. First, the postcode is submitted to generate a list
  of addresses. Then, the selected address ID (UPRN-like) is submitted to retrieve
  the collection dates.'
api_headers:
  content-type: application/x-www-form-urlencoded
api_payload_example: RESIDENTCOLLECTIONDATES_PAGESESSIONID=1c703789-49e9-4b05-8499-dcaf848e9daf&RESIDENTCOLLECTIONDATES_SESSIONID=6ce4ac5f-3e0f-4fb6-b8a0-1ca5bda74a04&RESIDENTCOLLECTIONDATES_NONCE=c99858ed-510b-4e8f-bec6-fb8945c69aa3&RESIDENTCOLLECTIONDATES_PAGENAME=PAGE1&RESIDENTCOLLECTIONDATES_PAGEINSTANCE=1&RESIDENTCOLLECTIONDATES_PAGE1_ADDRESS=39081672&RESIDENTCOLLECTIONDATES_FORMACTION_NEXT=RESIDENTCOLLECTIONDATES_PAGE1_ADDRESSNEXT
response_format: html
bin_selector: tr
date_format: '%d %B %Y'
test_inputs:
  postcode: L34 2GA
