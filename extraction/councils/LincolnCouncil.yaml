council: LincolnCouncil
request_type: token_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://contact.lincoln.gov.uk/authapi/isauthenticated
- https://contact.lincoln.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, a GET request is made to the authentication endpoint to retrieve
  a session ID (sid). This sid is then used as a parameter in a POST request to the
  runLookup endpoint, passing the user's UPRN and postcode in the JSON body within
  'formValues'.
response_format: json
date_format: '%Y-%m-%d'
test_inputs:
  uprn: 000235024846
  postcode: LN5 7SH
