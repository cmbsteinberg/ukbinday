council: StockportBoroughCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
api_urls:
- https://myaccount.stockport.gov.uk/bin-collections/show/postcode
- https://myaccount.stockport.gov.uk/bin-collections/show/[UPRN]
api_methods:
- POST
- GET
api_description: The first request is a POST to the postcode endpoint which triggers
  a lookup (usually resulting in a redirect or a list of addresses). The test parameters
  indicate that once a property ID (UPRN) is known, the data is accessible via a direct
  GET request to a URL containing that ID.
api_headers:
  Content-Type: application/x-www-form-urlencoded
api_payload_example: Postcode=SK1+1AA
response_format: html
bin_selector: div[class*="service-item"]
date_format: '%A, %d %B %Y'
