council: CheshireWestAndChesterCouncil
request_type: token_then_api
required_user_input:
- skip_get_url
- uprn
api_urls:
- https://my.cheshirewestandchester.gov.uk/authapi/isauthenticated
- https://my.cheshirewestandchester.gov.uk/apibroker/runLookup
api_methods:
- GET
- POST
api_description: First, the script calls an authentication endpoint to obtain a session
  ID. It then makes a lookup request to get an AuthenticateResponse token. Finally,
  it makes a POST request to the API broker with the UPRN and the token to retrieve
  the bin collection schedules.
response_format: json
date_format: '%d/%m/%Y'
test_inputs:
  uprn: '100012346655'
