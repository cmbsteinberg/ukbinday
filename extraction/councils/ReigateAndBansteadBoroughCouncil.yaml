  1":{"queryUprn":{"value":"000068134867"},"customerUprn":{"value":"68134867"},"uprn":{"value":"68134867"}}}}'
response_format: html
bin_selector: span[data-name="html2"] > div
date_format: '%A %d %B %Y'
test_inputs:
  uprn: '68134867'
