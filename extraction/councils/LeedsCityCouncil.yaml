council: LeedsCityCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- uprn
api_urls:
- https://api.leeds.gov.uk/public/addresses/v1/addresses?query=LS6%202SE
- https://api.leeds.gov.uk/public/waste/v1/BinsDays?uprn=72506983&startDate=2025-12-26&endDate=2026-06-12
api_methods:
- GET
- GET
api_description: The site uses a public API. First, it searches for addresses by postcode
  to let the user select a UPRN. Then, it calls the bin collection endpoint using
  the selected UPRN and a date range.
api_headers:
  Accept: application/json
  Origin: https://www.leeds.gov.uk
  Referer: https://www.leeds.gov.uk/
response_format: html
bin_selector: div.lcc-bin:not(.lcc-bin--calendar)
date_format: '%A %d %b %Y'
test_inputs:
  uprn: '72506983'
  postcode: LS6 2SE
