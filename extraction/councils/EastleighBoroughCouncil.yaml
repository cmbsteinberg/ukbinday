council: EastleighBoroughCouncil
request_type: single_api
required_user_input:
- uprn
api_urls:
- https://www.eastleigh.gov.uk/waste-bins-and-recycling/collection-dates/your-waste-bin-and-recycling-collections?uprn={uprn}
api_methods:
- GET
api_description: A direct GET request to the collection dates page using the UPRN
  as a query parameter.
api_headers:
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36
response_format: html
bin_selector: .dl-horizontal
date_format: '%a, %d %b %Y'
test_inputs:
  uprn: '100060303535'
