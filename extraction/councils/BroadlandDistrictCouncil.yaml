council: BroadlandDistrictCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- house_number
api_urls:
- https://area.southnorfolkandbroadland.gov.uk/FindAddress
- https://area.southnorfolkandbroadland.gov.uk/FindAddress/Submit
- https://area.southnorfolkandbroadland.gov.uk/
api_methods:
- GET
- POST
- POST
api_description: The process involves a GET to obtain a session and verification token,
  a POST with the postcode to retrieve a list of addresses/UPRNs, and a final POST
  to submit the selected address which then redirects to the results page.
api_headers:
  content-type: application/x-www-form-urlencoded
  user-agent: Mozilla/5.0
