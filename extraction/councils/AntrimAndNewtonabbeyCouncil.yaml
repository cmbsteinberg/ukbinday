council: AntrimAndNewtonabbeyCouncil
request_type: id_lookup_then_api
required_user_input:
- postcode
- paon
api_urls:
- https://antrimandnewtownabbey.gov.uk/residents/bins-recycling/bins-schedule/
api_methods:
- POST
- GET
api_description: The site uses a form submission process. First, a POST or GET request
  with a postcode triggers an address lookup (likely returning a list of address IDs).
  Then, selecting an address triggers a secondary fetch or a page reload with a specific
  'Id' parameter (as seen in the test parameters URL) which displays the bin collection
  schedule.
api_headers:
  Content-Type: application/x-www-form-urlencoded
api_payload_example: Postcode=BT36+5AA&AddressID=643
response_format: html
bin_selector: div.feature-box.bins
date_format: '%a %d %b, %Y'
