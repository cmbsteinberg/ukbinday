[project]
name = "bins"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "fastapi>=0.135.1",
    "htpy>=25.12.0",
    "httpx>=0.28.1",
    "icalendar>=7.0.3",
    "icalevents>=0.1.27",
    "jinja2>=3.1.0",
    "lxml>=6.0.2",
    "pytest>=9.0.2",
    "python-dateutil>=2.9.0.post0",
    "redis>=7.3.0",
    "uvicorn>=0.42.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src", "src/waste_collection_schedule"]

[dependency-groups]
dev = [
    "lefthook>=2.1.4",
]

[tool.ruff]
exclude = ["src/scrapers"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]
