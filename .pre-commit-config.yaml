repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.14.10
  hooks:
    # Run the linter.
    - id: ruff-check
      types_or: [ python, pyi ]
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
      types_or: [ python, pyi ]
- repo: https://github.com/biomejs/pre-commit
  rev: v2.3.10
  hooks:
    - id: biome-check
      additional_dependencies: ["@biomejs/biome@1.9.4"]
      files: ^bins-website/.*\.(js|jsx|ts|tsx)$

- repo: local
  hooks:
    # Regenerate councils-data.json from YAML files
    - id: regenerate-councils-json
      name: Regenerate councils-data.json
      entry: bash -c 'cd bins-website && uv run python utils/convert-yaml.py'
      language: system
      files: ^src/councils/.*\.yaml$
      pass_filenames: false
      always_run: false
      stages: [pre-commit]

    # Check that councils-data.json is up to date
    - id: check-councils-json-updated
      name: Check councils-data.json is staged
      entry: .pre-commit-scripts/check-councils-json.sh
      language: system
      pass_filenames: false
      always_run: true
      stages: [pre-commit]